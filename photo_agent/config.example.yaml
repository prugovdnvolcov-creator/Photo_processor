# AI Photo Agent Configuration Example
# Copy this file to config.yaml and customize as needed

# Canvas settings
canvas:
  width: 1280
  height: 840
  product_bg_color: "#FAFAFA"

# Analysis thresholds
analysis:
  strip_width_ratio: 0.15
  bg_laplacian_threshold: 32.0
  bg_entropy_threshold: 5.2

# AI settings
ai:
  confidence_threshold: 0.80
  similarity_threshold: 0.92
  model_name: "openai/clip-vit-base-patch32"
  cache_dir: null  # Set to a path to cache models
  enable_ai: true

# Background physics detection
background_physics:
  white_peak_threshold: 230
  max_saturation_threshold: 15
  hist_spike_min: 0.75

# Plate geometry detection
plate_geometry:
  solidity_min: 0.93
  circularity_min: 0.74
  rim_sensitivity: 8

# Visual enhancement
visual_enhancement:
  final_sharpness: 1.15
  final_contrast: 1.05

# Shape classification thresholds
shape:
  bottle_max_aspect_ratio: 0.65
  bottle_neck_threshold: 0.82
  thin_aspect_threshold: 0.45
  normal_aspect_threshold: 1.15
  long_aspect_threshold: 1.75
  small_coverage_threshold: 0.15

# Paths
paths:
  download_dir: "downloads_temp"
  output_dir: "output_processed"
  knowledge_base_dir: "knowledge_base"
  log_file: "agent_v107.log"

# Security settings
security:
  max_file_size_mb: 50
  max_url_length: 2048
  enable_path_sanitization: true
  allowed_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
    - ".gif"
    - ".tiff"
    - ".heic"

# Performance tuning
performance:
  enable_gpu: true
  batch_size: 1
  num_workers: 4
  memory_limit_mb: 4096
